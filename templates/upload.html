<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Resume Upload</span>

        <div>
            <a href="/dashboard" class="btn btn-primary btn-sm">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header text-center">
                    <h3>Upload Resume Files</h3>
                </div>

                <div class="card-body">

                    <form method="POST" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label>Select PDF or DOCX Files</label>
                            <input type="file" name="resume" class="form-control" multiple required>
                        </div>

                        <button class="btn btn-success w-100">Upload Resume</button>

                    </form>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
